<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Blood Bank | Access Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: #fafafa; color: #111827; }</style>
</head>
<body class="antialiased">

    <nav class="bg-white border-b border-gray-100 px-8 py-5 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <a href="index.html" class="flex items-center gap-2 hover:opacity-75 transition-opacity cursor-pointer">
            <svg class="w-6 h-6 text-red-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z" /></svg>
            <h1 class="text-xl font-bold tracking-tight text-gray-900">E-Blood <span class="font-normal text-gray-400">| Live Inventory</span></h1>
        </a>
        <button onclick="fetchDonors()" class="text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors flex items-center gap-2 active:scale-95">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            Refresh Data
        </button>
    </nav>

    <main class="max-w-7xl mx-auto px-8 py-12">
        <div class="mb-10">
            <h2 class="text-3xl font-bold text-gray-900">Available Donors</h2>
            <p class="text-gray-500 mt-2">Contact verified donors directly for urgent medical requirements.</p>
        </div>

        <div id="donor-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12 text-gray-400 font-medium animate-pulse">Fetching live database records...</div>
        </div>
    </main>

    <script>
        async function fetchDonors() {
            const grid = document.getElementById('donor-grid');
            try {
                grid.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400 font-medium animate-pulse">Fetching live database records...</div>';
                
                const response = await fetch('/api/donors');
                const donors = await response.json();
                grid.innerHTML = ''; 

                if (donors.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500 bg-white rounded-2xl border border-gray-100 shadow-sm">No donors available in the bank right now.</div>`;
                    return;
                }

                donors.forEach(donor => {
                    grid.innerHTML += `
                        <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-[0_4px_20px_rgb(0,0,0,0.03)] flex flex-col justify-between hover:-translate-y-1 transition-transform">
                            <div>
                                <div class="flex justify-between items-start mb-4">
                                    <div class="bg-red-50 text-red-600 font-bold text-xl px-4 py-2 rounded-xl border border-red-100">${donor.bloodGroup}</div>
                                    <span class="text-xs font-medium text-gray-400 bg-gray-50 px-3 py-1 rounded-full border border-gray-100">Verified</span>
                                </div>
                                <h3 class="text-lg font-bold text-gray-900">${donor.fullName}</h3>
                                
                                <div class="mt-3 space-y-1">
                                    <p class="text-gray-600 text-sm flex items-center gap-2">
                                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                                        ${donor.phone || 'N/A'}
                                    </p>
                                    <p class="text-gray-600 text-sm flex items-center gap-2">
                                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                        ${donor.city}
                                    </p>
                                </div>
                            </div>
                            
                            <div class="mt-6 flex gap-3">
                                <a href="tel:${donor.phone}" class="flex-1 bg-red-600 text-white text-center font-medium py-2.5 rounded-xl hover:bg-red-700 transition-colors shadow-sm">
                                    Call Now
                                </a>
                                <a href="mailto:${donor.email}?subject=URGENT:%20Blood%20Donation%20Request%20(${donor.bloodGroup})" class="flex-1 bg-gray-900 text-white text-center font-medium py-2.5 rounded-xl hover:bg-gray-800 transition-colors shadow-sm">
                                    Email
                                </a>
                            </div>
                        </div>`;
                });
            } catch (err) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-red-500 bg-red-50 rounded-2xl border border-red-100">Ensure Node.js server is running on port 5000.</div>`;
            }
        }
        
        window.onload = fetchDonors;
    </script>
</body>
</html>
