<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Blood | Minimalist Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: #fafafa; color: #111827; }
        .float-slow { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased selection:bg-red-200 selection:text-red-900">

    <nav class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center bg-transparent relative z-20">
        <div class="flex items-center gap-2">
            <svg class="w-6 h-6 text-red-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z" /></svg>
            <h1 class="text-2xl font-bold tracking-tight text-gray-900">E-Blood.</h1>
        </div>
        <div class="hidden md:flex space-x-8 text-sm font-medium text-gray-600">
            <a href="#" class="hover:text-red-600 transition-colors">Home</a>
            <a href="#portal" onclick="switchTab('donate')" class="hover:text-red-600 transition-colors">Donate</a>
            <a href="#portal" onclick="switchTab('request')" class="hover:text-red-600 transition-colors">Request Blood</a>
        </div>
        <a href="portal.html" target="_blank" class="bg-gray-900 text-white px-6 py-2.5 rounded-full text-sm font-medium hover:bg-gray-800 transition-colors">
            Access Portal
        </a>
    </nav>

    <main class="relative max-w-7xl mx-auto px-6 pt-12 pb-24 grid lg:grid-cols-2 gap-16 items-center min-h-[85vh]">
        <div class="space-y-8 z-10">
            <div class="space-y-4">
                <span class="text-red-600 font-semibold tracking-wider uppercase text-sm">The Life Network</span>
                <h2 class="text-6xl md:text-7xl font-bold leading-[1.1] tracking-tight text-gray-900">Give blood.<br>Save <span class="text-red-600">lives.</span></h2>
                <p class="text-xl text-gray-500 max-w-lg leading-relaxed">Whether you are here to donate to the community or request emergency blood for a patient, you are in the right place.</p>
            </div>
            <div class="pt-8">
                <svg class="w-24 h-24 text-red-500 float-slow drop-shadow-xl" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z" /></svg>
            </div>
        </div>

        <div id="portal" class="bg-white p-10 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 z-10 relative">
            <div class="flex gap-6 mb-8 border-b border-gray-100 pb-1">
                <button id="tab-donate" onclick="switchTab('donate')" class="text-lg font-bold text-red-600 border-b-2 border-red-600 pb-2 transition-all">Donate Blood</button>
                <button id="tab-request" onclick="switchTab('request')" class="text-lg font-medium text-gray-400 hover:text-gray-900 pb-2 transition-all">Request Blood</button>
            </div>

            <div id="form-donate" class="space-y-4 fade-in">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <input id="donorName" type="text" placeholder="Full Name" class="w-full bg-gray-50 border border-gray-200 p-3.5 rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                        <p id="donorNameError" class="mt-1 text-sm text-red-600 min-h-[1.25rem]"></p>
                    </div>
                    <div>
                        <select id="donorGroup" class="w-full bg-gray-50 border border-gray-200 p-3.5 rounded-xl focus:ring-2 focus:ring-red-500 outline-none cursor-pointer">
                            <option value="" disabled selected>Blood Group</option>
                            <option value="A+">A+</option><option value="A-">A-</option><option value="B+">B+</option><option value="B-">B-</option><option value="O+">O+</option><option value="O-">O-</option><option value="AB+">AB+</option><option value="AB-">AB-</option>
                        </select>
                        <p id="donorGroupError" class="mt-1 text-sm text-red-600 min-h-[1.25rem]"></p>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <input id="donorEmail" type="email" placeholder="Email Address" class="w-full bg-gray-50 border border-gray-200 p-3.5 rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                        <p id="donorEmailError" class="mt-1 text-sm text-red-600 min-h-[1.25rem]"></p>
                    </div>
                    <div>
                        <input id="donorPhone" type="tel" inputmode="numeric" pattern="[0-9]{10}" maxlength="10" placeholder="Phone Number" class="w-full bg-gray-50 border border-gray-200 p-3.5 rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                        <p id="donorPhoneError" class="mt-1 text-sm text-red-600 min-h-[1.25rem]"></p>
                    </div>
                </div>
                <div>
                    <input id="donorCity" type="text" placeholder="City / Region" class="w-full bg-gray-50 border border-gray-200 p-3.5 rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                    <p id="donorCityError" class="mt-1 text-sm text-red-600 min-h-[1.25rem]"></p>
                </div>
                <button onclick="registerDonor()" class="w-full bg-red-600 text-white font-semibold py-4 rounded-xl mt-2 hover:bg-red-700 transition-all shadow-md">Complete Registration</button>
            </div>

            <div id="form-request" class="space-y-4 hidden fade-in">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <input id="reqHospital" type="text" placeholder="Hospital Name" class="w-full bg-gray-50 border border-gray-200 p-3.5 rounded-xl focus:ring-2 focus:ring-gray-900 outline-none">
                        <p id="reqHospitalError" class="mt-1 text-sm text-red-600 min-h-[1.25rem]"></p>
                    </div>
                    <div>
                        <select id="reqGroup" class="w-full bg-gray-50 border border-gray-200 p-3.5 rounded-xl focus:ring-2 focus:ring-gray-900 outline-none cursor-pointer">
                            <option value="" disabled selected>Blood Group Needed</option>
                            <option value="A+">A+</option><option value="A-">A-</option><option value="B+">B+</option><option value="B-">B-</option><option value="O+">O+</option><option value="O-">O-</option><option value="AB+">AB+</option><option value="AB-">AB-</option>
                        </select>
                        <p id="reqGroupError" class="mt-1 text-sm text-red-600 min-h-[1.25rem]"></p>
                    </div>
                </div>
                <div>
                    <select id="reqUrgency" class="w-full bg-gray-50 border border-gray-200 p-3.5 rounded-xl focus:ring-2 focus:ring-gray-900 outline-none cursor-pointer">
                        <option value="Critical">🔴 Critical (Needed immediately)</option>
                        <option value="Stable">🟡 Stable (Needed within 24hrs)</option>
                    </select>
                    <p id="reqUrgencyError" class="mt-1 text-sm text-red-600 min-h-[1.25rem]"></p>
                </div>
                <div>
                    <input id="reqLocation" type="text" placeholder="Ward / Location" class="w-full bg-gray-50 border border-gray-200 p-3.5 rounded-xl focus:ring-2 focus:ring-gray-900 outline-none">
                    <p id="reqLocationError" class="mt-1 text-sm text-red-600 min-h-[1.25rem]"></p>
                </div>
                <button onclick="requestBlood()" class="w-full bg-gray-900 text-white font-semibold py-4 rounded-xl mt-2 hover:bg-black transition-all shadow-md">Broadcast Emergency</button>
            </div>
        </div>
    </main>

    <script>
        function switchTab(tab) {
            document.getElementById('tab-donate').className = tab === 'donate' ? "text-lg font-bold text-red-600 border-b-2 border-red-600 pb-2 transition-all" : "text-lg font-medium text-gray-400 hover:text-gray-900 pb-2 transition-all";
            document.getElementById('tab-request').className = tab === 'request' ? "text-lg font-bold text-gray-900 border-b-2 border-gray-900 pb-2 transition-all" : "text-lg font-medium text-gray-400 hover:text-red-600 pb-2 transition-all";
            document.getElementById('form-donate').classList.toggle('hidden', tab !== 'donate');
            document.getElementById('form-request').classList.toggle('hidden', tab !== 'request');
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function isValidPhone(phone) {
            return /^[+]?[-\d\s()]{8,20}$/.test(phone) && /\d/.test(phone);
        }

        function isValidText(value) {
            return /^[A-Za-z][A-Za-z\s'.-]{1,}$/.test(value);
        }

        function isValidPlaceText(value) {
            return /^[A-Za-z0-9][A-Za-z0-9\s'&.,\/-]{1,}$/.test(value);
        }

        function clearValidationErrors() {
            [
                'donorNameError', 'donorGroupError', 'donorEmailError', 'donorPhoneError', 'donorCityError',
                'reqHospitalError', 'reqGroupError', 'reqUrgencyError', 'reqLocationError'
            ].forEach((id) => {
                const element = document.getElementById(id);
                if (element) element.textContent = '';
            });
        }

        function setFieldError(fieldId, message) {
            const errorElement = document.getElementById(`${fieldId}Error`);
            if (errorElement) errorElement.textContent = message;
        }

        function validateDonateForm(data) {
            clearValidationErrors();

            if (!data.fullName) return { field: 'donorName', message: 'Full name is required.' };
            if (!data.bloodGroup) return { field: 'donorGroup', message: 'Blood group is required.' };
            if (!data.email) return { field: 'donorEmail', message: 'Email address is required.' };
            if (!data.phone) return { field: 'donorPhone', message: 'Phone number is required.' };
            if (!data.city) return { field: 'donorCity', message: 'City is required.' };
            if (!isValidText(data.fullName)) return { field: 'donorName', message: 'Full name should contain only letters and standard name characters.' };
            if (!isValidEmail(data.email)) return { field: 'donorEmail', message: 'Email should be in correct format.' };
            if (!/^\d+$/.test(data.phone)) return { field: 'donorPhone', message: 'Phone number should contain only digits.' };
            if (data.phone.length !== 10) return { field: 'donorPhone', message: 'Phone number should be exactly 10 digits.' };
            if (!isValidText(data.city)) return { field: 'donorCity', message: 'City should contain only letters and standard name characters.' };
            return null;
        }

        function validateRequestForm(data) {
            clearValidationErrors();

            if (!data.hospitalName) return { field: 'reqHospital', message: 'Hospital name is required.' };
            if (!data.requiredGroup) return { field: 'reqGroup', message: 'Blood group needed is required.' };
            if (!data.urgency) return { field: 'reqUrgency', message: 'Urgency is required.' };
            if (!data.location) return { field: 'reqLocation', message: 'Location is required.' };
            if (!isValidPlaceText(data.hospitalName)) return { field: 'reqHospital', message: 'Hospital name should contain valid characters only.' };
            if (!isValidPlaceText(data.location)) return { field: 'reqLocation', message: 'Location should contain valid characters only.' };
            return null;
        }

        const isLocalDev = ['localhost', '127.0.0.1'].includes(window.location.hostname) && window.location.port === '5000';
        const socket = isLocalDev ? io(window.location.origin) : null;
        if (socket) {
            socket.on('new_emergency', (data) => alert(`🚨 URGENT: Blood Group ${data.requiredGroup} needed at ${data.hospitalName}! Urgency: ${data.urgency}`));
        }

        async function registerDonor() {
            // Added donorPhone here
            const data = { 
                fullName: document.getElementById('donorName').value, 
                bloodGroup: document.getElementById('donorGroup').value, 
                email: document.getElementById('donorEmail').value, 
                phone: document.getElementById('donorPhone').value, 
                city: document.getElementById('donorCity').value 
            };
            data.fullName = data.fullName.trim();
            data.bloodGroup = data.bloodGroup.trim();
            data.email = data.email.trim();
            data.phone = data.phone.trim();
            data.city = data.city.trim();

            const validationError = validateDonateForm(data);
            if (validationError) {
                setFieldError(validationError.field, validationError.message);
                document.getElementById(validationError.field)?.focus();
                return;
            }

            try {
                const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                const responseData = await res.json().catch(() => ({}));
                if (!res.ok) {
                    const field = responseData?.error?.field || 'donorEmail';
                    const message = responseData?.error?.message || 'Registration failed.';
                    setFieldError(field, message);
                    document.getElementById(field)?.focus();
                    return;
                }
                // Success: show popup, clear form and errors
                alert('Registered successfully!');
                clearValidationErrors();
                document.getElementById('donorName').value = '';
                document.getElementById('donorGroup').value = '';
                document.getElementById('donorEmail').value = '';
                document.getElementById('donorPhone').value = '';
                document.getElementById('donorCity').value = '';
            } catch (err) {
                setFieldError('donorEmail', 'Backend offline. Ensure server.js is running!');
            }
        }

        async function requestBlood() {
            const data = {
                hospitalName: document.getElementById('reqHospital').value.trim(),
                requiredGroup: document.getElementById('reqGroup').value,
                urgency: document.getElementById('reqUrgency').value,
                location: document.getElementById('reqLocation').value.trim()
            };

            const validationError = validateRequestForm(data);
            if (validationError) {
                setFieldError(validationError.field, validationError.message);
                document.getElementById(validationError.field)?.focus();
                return;
            }

            try {
                const loginRes = await fetch('/api/login', { method: 'POST' });
                const { token } = await loginRes.json();
                const res = await fetch('/api/emergencies', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': token }, body: JSON.stringify(data) });
                const responseData = await res.json().catch(() => ({}));
                if (!res.ok) {
                    const field = responseData?.error?.field || 'reqHospital';
                    const message = responseData?.error?.message || 'Emergency request failed.';
                    setFieldError(field, message);
                    document.getElementById(field)?.focus();
                    return;
                }
                alert('Emergency request submitted successfully!');
                clearValidationErrors();
                document.getElementById('reqHospital').value = '';
                document.getElementById('reqGroup').value = '';
                document.getElementById('reqUrgency').value = 'Critical';
                document.getElementById('reqLocation').value = '';
            } catch (err) {
                setFieldError('reqHospital', 'Backend offline. Ensure server.js is running!');
            }
        }
    </script>
</body>
</html>
